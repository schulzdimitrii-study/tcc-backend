# Pipeline CI/CD
# Etapas: Build → Test → Code Coverage → Deploy

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────
  # STEP 1: BUILD
  # Project Compilation
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tcc_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build project
        run: ./mvnw clean install
  

  # ──────────────────────────────────────────
  # STEP 2: TESTS
  # Run Unit Tests
  # ──────────────────────────────────────────
  tests:
    name: Tests
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tcc_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test


  # ──────────────────────────────────────────
  # STEP 3: CODE COVERAGE
  # Code Coverage Analysis
  # ──────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo
        run: mvn clean verify

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7


  # ──────────────────────────────────────────
  # STEP 4: NOTIFICATION
  # Execute a script to send a notification to WhatsApp
  # ──────────────────────────────────────────
  notification:
    name: Notification
    needs: coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install mailutils
        run: sudo apt-get update && sudo apt-get install -y mailutils

      - name: Notification Script (Shell)
        env:
          NOTIFICATION_RECIPIENTS: ${{ secrets.NOTIFICATION_RECIPIENTS }}
        run: sh src/ci_notification.sh
        

  # ──────────────────────────────────────────
  # STEP 5: DEPLOY
  # Deploy to Production
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [ tests, coverage ]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
