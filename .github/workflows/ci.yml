# Pipeline CI/CD
# Etapas: Build → Test → Code Coverage → Notification → Deploy

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────
  # STEP 1: BUILD
  # Project Compilation
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: ./mvnw clean install -DskipTests


  # ──────────────────────────────────────────
  # STEP 2: TESTS
  # Run Unit Tests
  # ──────────────────────────────────────────
  tests:
    name: Tests
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tcc_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U test -d tcc_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw clean test


  # ──────────────────────────────────────────
  # STEP 3: CODE COVERAGE
  # Code Coverage Analysis with JaCoCo
  # ──────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tcc_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U test -d tcc_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo
        run: ./mvnw clean verify

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7


  # ──────────────────────────────────────────
  # STEP 4: NOTIFICATION
  # Send email notification on success or failure
  # Required secrets:
  #   MAIL_SERVER        → SMTP server (e.g. smtp.gmail.com)
  #   MAIL_USERNAME      → Sender email address
  #   MAIL_PASSWORD      → App password (not account password)
  #   NOTIFICATION_RECIPIENTS → Comma-separated recipient emails
  # ──────────────────────────────────────────
  notification:
    name: Notification
    needs: [tests, coverage]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send success email
        if: needs.tests.result == 'success' && needs.coverage.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ CI Passed — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            ✅ CI pipeline completed successfully!

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: needs.tests.result == 'failure' || needs.coverage.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI Failed — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            ❌ CI pipeline failed!

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            Tests    : ${{ needs.tests.result }}
            Coverage : ${{ needs.coverage.result }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}


  # ──────────────────────────────────────────
  # STEP 5: DEPLOY
  # Deploy to Production
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [tests, coverage]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
